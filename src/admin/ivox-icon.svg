<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#06b6d4"/>
      <stop offset="40%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="auroral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#080d1a"/>
  <!-- Aurora tint -->
  <rect width="512" height="512" rx="112" fill="url(#auroral)"/>

  <!-- Aurora arc glow behind icon -->
  <ellipse cx="256" cy="310" rx="200" ry="80" fill="none"
    stroke="url(#aurora)" stroke-width="28" opacity="0.35" filter="url(#glow)"/>

  <!-- Phone icon centered -->
  <path d="M156 144a20 20 0 0 1 20-20h56a16 16 0 0 1 15.16 10.94l20 60a16 16 0 0 1-4.04 16.96l-30 28a168 168 0 0 0 78.98 78.98l28-30a16 16 0 0 1 16.96-4.04l60 20A16 16 0 0 1 432 320v56a20 20 0 0 1-20 20h-16C219.84 396 116 292.16 116 172v-16l40-12z"
    fill="url(#aurora)" filter="url(#glow)"/>
</svg>
